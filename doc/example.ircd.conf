# ---[ Juped Nicknames ]---------------------------------------------------

Jupe {
  nick = "ChanServ";
  nick = "NickServ";
  nick = "MemoServ";
  nick = "OperServ";
  nick = "HelpServ";
  nick = "BotServ";
  nick = "HostServ";
  nick = "Global";
  nick = "GroupServ";
  nick = "ChanFix";
  nick = "InfoServ";
  nick = "SpamServ";
  nick = "GameServ";
  nick = "RootServ";
  nick = "Moo";
  nick = "DroneScan";
  nick = "LimitServ";
  nick = "Admin";
  nick = "Root";
  nick = "Server";
  nick = "Services";
};

# ---[ Service Aliases ]---------------------------------------------------

Pseudo "CHANSERV"  { name = "ChanServ";  nick = "ChanServ@services.example.org"; };
Pseudo "NICKSERV"  { name = "NickServ";  nick = "NickServ@services.example.org"; };
Pseudo "OPERSERV"  { name = "OperServ";  nick = "OperServ@services.example.org"; };
Pseudo "MEMOSERV"  { name = "MemoServ";  nick = "MemoServ@services.example.org"; };
Pseudo "HELPSERV"  { name = "HelpServ";  nick = "HelpServ@services.example.org"; };
Pseudo "BOTSERV"   { name = "BotServ";   nick = "BotServ@services.example.org"; };
Pseudo "HOSTSERV"  { name = "HostServ";  nick = "HostServ@services.example.org"; };
Pseudo "GLOBAL"    { name = "Global";    nick = "Global@services.example.org"; };
Pseudo "GROUPSERV" { name = "GroupServ"; nick = "GroupServ@services.example.org"; };
Pseudo "CHANFIX"   { name = "ChanFix";  nick = "ChanFix@services.example.org"; };
Pseudo "INFOSERV"  { name = "InfoServ"; nick = "InfoServ@services.example.org"; };
Pseudo "SPAMSERV"  { name = "SpamServ"; nick = "SpamServ@services.example.org"; };
Pseudo "GAMESERV"  { name = "GameServ"; nick = "GameServ@acid.example.org"; };
Pseudo "ROOTSERV"  { name = "RootServ"; nick = "RootServ@acid.example.org"; };

# ---[ Features ]----------------------------------------------------------

Features {
  "NETWORK"               = "ExampleNet";
  "DOMAINNAME"            = "example.org";
  "HUB"                   = "TRUE";
  "HIS_SERVERNAME"        = "*.example.org";
  "HIS_SERVERINFO"        = "Example Network";

  # File paths
  "MPATH"                 = "ircd.motd";
  "PPATH"                 = "ircd.pid";

  # Security — generate with: umkpasswd -m sha512 <password>
  "DIEPASS"               = "";
  "RESTARTPASS"           = "";
  "CONFIG_OPERCMDS"       = "TRUE";

  # Host cloaking — generate all three with: openssl rand -hex 32
  "HOST_HIDING"           = "TRUE";
  "HOST_HIDING_STYLE"     = "3";
  "HOST_HIDING_PREFIX"    = "ExampleNet";
  "HOST_HIDING_KEY1"      = "CHANGEME_openssl_rand_hex_32";
  "HOST_HIDING_KEY2"      = "CHANGEME_openssl_rand_hex_32";
  "HOST_HIDING_KEY3"      = "CHANGEME_openssl_rand_hex_32";
  "HOST_HIDING_COMPONENTS" = "3";
  "HOST_HIDING_HMAC"      = "TRUE";
  "HIDDEN_HOST"           = "Users.ExampleNet";

  # S2S HMAC — per-link control (Cathexis 1.4.1+)
  # Enables the HMAC subsystem. Each Connect block must also have
  # "hmac = yes" to enforce HMAC on that specific link.
  "S2S_HMAC"              = "TRUE";
  "S2S_CSYNC"             = "TRUE";

  # SSL/TLS
  "SSL_CERTFILE"          = "ircd.pem";
  "SSL_KEYFILE"           = "ircd.pem";
  "SSL_VERIFYCERT"        = "FALSE";
  "SSL_NOSELFSIGNED"      = "FALSE";

  # DNSBL
  "DNSBL"                 = "TRUE";
  "DNSBL_HOST"            = "dnsbl.dronebl.org";
  "DNSBL_HOST2"           = "rbl.efnetrbl.org";
  "DNSBL_REJECT"          = "TRUE";
  "DNSBL_REASON"          = "Your IP is listed in a DNS blacklist.";

  # Channels
  "HALFOPS"               = "TRUE";
  "OWNERPROTECT"          = "TRUE";
  "EXCEPTS"               = "TRUE";
  "MAXCHANNELSPERUSER"    = "20";
  "NICKLEN"               = "30";

  # IRCv3
  "CAP_sasl"              = "TRUE";
  "CAP_multi_prefix"      = "TRUE";
  "CAP_away_notify"       = "TRUE";
  "CAP_account_notify"    = "TRUE";
  "CAP_server_time"       = "TRUE";

  # Login on connect
  "LOGIN_ON_CONNECT"      = "TRUE";
  "LOC_DEFAULT_SERVICE"   = "NickServ";

  # SASL
  "SASL_SERVER"           = "*";
};
