# ==========================================================================
# Cathexis IRCd — Example Configuration
# ==========================================================================
# Version: 1.5.4
# Copyright (c) Cathexis Development
#
# MINIMUM changes required before first start:
#   1. General { name, description, numeric }
#   2. Admin { Location, Contact }
#   3. Operator { name, password }
#   4. Features { HOST_HIDING_KEY1/2/3 }
#   5. Connect blocks for services
#
# Generate cloaking keys:   openssl rand -hex 32
# Generate oper password:   /path/to/umkpasswd -m sha512 <password>
# Generate link password:   openssl rand -hex 32
# ==========================================================================

General {
  name        = "irc.example.org";
  description = "Example IRC Network";
  numeric     = 1;
};

Admin {
  Location = "Example Network";
  Location = "Operations Team";
  Contact  = "admin@example.org";
};

# ---[ Connection Classes ]-------------------------------------------------

Class {
  name        = "Users";
  pingfreq    = 1 minutes 30 seconds;
  sendq       = 160000;
  recvq       = 8000;
  maxlinks    = 0;
  maxchans    = 20;
  usermode    = "+ix";
  fakelagminimum = 2;
  fakelagfactor  = 120;
};

Class {
  name        = "Opers";
  pingfreq    = 3 minutes;
  sendq       = 640000;
  recvq       = 16000;
  maxlinks    = 0;
  maxchans    = 0;
  snomask     = "nKgDtco";
  fakelagminimum = 0;
  fakelagfactor  = 0;
};

Class {
  name        = "Services";
  pingfreq    = 120 seconds;
  connectfreq = 30 seconds;
  maxlinks    = 1;
  sendq       = 10000000;
  recvq       = 0;
};

# ---[ Client Authorization ]-----------------------------------------------

Client {
  class    = "Users";
  ip       = "*";
  maxlinks = 3;
};

# ---[ IRC Operators ]------------------------------------------------------
# Generate: umkpasswd -m sha512 <password>

Operator {
  name     = "admin";
  host     = "*@*";
  password = "$CHANGEME";   # umkpasswd -m sha512 <password>
  class    = "Opers";
  local    = no;
  propagate = yes;
  netadmin = yes;
  admin    = yes;
  kill     = yes;
  gline    = yes;
  shun     = yes;
  zline    = yes;
  jupe     = yes;
  opmode   = yes;
  rehash   = yes;
  restart  = yes;
  die      = yes;
  set      = yes;
  check    = yes;
  whois_notice = yes;
  hide_oper    = yes;
  hide_channels = yes;
  hide_idle    = yes;
  display  = yes;
  see_opers = yes;
  wide_gline = yes;
  wide_shun  = yes;
  wide_zline = yes;
  tempshun = yes;
  remove   = yes;
  freeform = yes;
  remote   = yes;
  remoterehash = yes;
  force_opmode = yes;
  force_local_opmode = yes;
  apass_opmode = yes;
  xtraop   = yes;
  show_invis = yes;
  show_all_invis = yes;
  unlimit_query = yes;
  see_chan  = yes;
  list_chan = yes;
  chan_limit = yes;
  whox     = yes;
};

# ---[ Ports ]--------------------------------------------------------------

Port { port = 6667; };
Port { port = 6668; };
Port { port = 6669; };
Port { ssl = yes; port = 6697; };
Port { server = yes; port = 4400; };
Port { server = yes; ssl = yes; port = 4401; };

