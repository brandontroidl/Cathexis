# ==========================================================================
# Cathexis IRCd — Production Configuration
# ==========================================================================
# Version: 1.1.0
#
# This is a WORKING configuration. Edit the values below to match your
# network, then copy to your ircd lib directory:
#   cp ircd.conf /home/ircd/lib/ircd.conf
#
# MINIMUM changes required before first start:
#   1. General { name, description, numeric }
#   2. Admin { Location, Contact }
#   3. Operator { name, password }
#   4. Features { HOST_HIDING_KEY1/2/3 } — generate unique random keys
#
# Generate cloaking keys:   openssl rand -hex 32
# Generate oper password:   /home/ircd/bin/umkpasswd bcrypt <password>
# ==========================================================================

# ---[ Server Identity ]----------------------------------------------------
General {
  name        = "irc.example.com";
  description = "Cathexis IRC Server";
  numeric     = 1;
};

# ---[ Admin Contact ]------------------------------------------------------
Admin {
  Location = "Example Network";
  Location = "Somewhere on the Internet";
  Contact  = "admin@example.com";
};

# ---[ Connection Classes ]-------------------------------------------------
# Classes define connection behavior for groups of clients/servers.

# Default class for regular users
Class {
  name        = "Users";
  pingfreq    = 1 minutes 30 seconds;
  sendq       = 160000;
  recvq       = 8000;
  maxlinks    = 0;
  maxchans    = 20;
  usermode    = "+ix";
  fakelagminimum = 2;
  fakelagfactor  = 120;
};

# Class for known/registered users (higher limits)
Class {
  name        = "Registered";
  pingfreq    = 1 minutes 30 seconds;
  sendq       = 320000;
  recvq       = 8000;
  maxlinks    = 0;
  maxchans    = 40;
  usermode    = "+ix";
  fakelagminimum = 1;
  fakelagfactor  = 180;
};

# Class for IRC operators
Class {
  name        = "Opers";
  pingfreq    = 3 minutes;
  sendq       = 640000;
  recvq       = 16000;
  maxlinks    = 0;
  maxchans    = 0;
  snomask     = "nKgDtco";
  fakelagminimum = 0;
  fakelagfactor  = 0;
};

# Class for server-to-server links
Class {
  name        = "Server";
  pingfreq    = 3 minutes;
  connectfreq = 5 minutes;
  maxlinks    = 1;
  sendq       = 9000000;
  recvq       = 0;
};

# Hub server class (allows multiple server links)
Class {
  name        = "Hub";
  pingfreq    = 3 minutes;
  connectfreq = 5 minutes;
  maxlinks    = 0;
  sendq       = 9000000;
  recvq       = 0;
};

# ---[ Client Authorization ]-----------------------------------------------
# Allow all clients by default (restrict via G-lines/Z-lines as needed)
Client {
  class    = "Users";
  ip       = "*";
  maxlinks = 3;
};

# ---[ IRC Operators ]------------------------------------------------------
# Generate password: /home/ircd/bin/umkpasswd bcrypt <password>
# Then paste the $BCRYPT$... hash below.
#
# Example with plaintext password "changeme" (CHANGE THIS):
Operator {
  name     = "admin";
  host     = "*@*";
  password = "$PLAIN$changeme";
  class    = "Opers";

  # --- Privileges ---
  local            = no;
  propagate        = yes;
  netadmin         = yes;
  admin            = yes;
  kill             = yes;
  gline            = yes;
  shun             = yes;
  zline            = yes;
  jupe             = yes;
  opmode           = yes;
  rehash           = yes;
  restart          = yes;
  die              = yes;
  set              = yes;
  check            = yes;
  whois_notice     = yes;
  hide_oper        = yes;
  hide_channels    = yes;
  hide_idle        = yes;
  display          = yes;
  see_opers        = yes;
  wide_gline       = yes;
  wide_shun        = yes;
  wide_zline       = yes;
  tempshun         = yes;
  remove           = yes;
  freeform         = yes;
  remote           = yes;
  remoterehash     = yes;
  force_opmode     = yes;
  force_local_opmode = yes;
  apass_opmode     = yes;
  xtraop           = yes;
};

# ---[ Listening Ports ]----------------------------------------------------
# Standard IRC client port
Port { port = 6667; };

# Additional client port
Port { port = 6668; };

# SSL/TLS client port (requires SSL build)
# Port { ssl = yes; port = 6697; };

# Server-to-server link port
Port { server = yes; port = 4400; };

# Server-to-server link port (hidden from stats)
Port { server = yes; hidden = yes; port = 4401; };

# ---[ Server Links ]------------------------------------------------------
# Uncomment and edit to link to another server.
#
# Connect {
#   name      = "hub.example.com";
#   host      = "192.168.1.100";
#   password  = "linkpassword";
#   port      = 4400;
#   class     = "Server";
#   hub       = "*";
#   autoconnect = yes;
# };

# ---[ WebIRC Gateways ]---------------------------------------------------
# Uncomment for KiwiIRC, The Lounge, or other web gateways.
#
# WebIRC {
#   host     = "*@127.0.0.1";
#   password = "$PLAIN$webircpassword";
#   description = "Web Gateway";
#   enableoptions = yes;
# };

# ---[ Juped Nicknames ]---------------------------------------------------
# Reserve service nicknames
Jupe {
  nick = "ChanServ";
  nick = "NickServ";
  nick = "MemoServ";
  nick = "OperServ";
  nick = "HelpServ";
  nick = "AuthServ";
  nick = "Global";
  nick = "BotServ";
  nick = "HostServ";
  nick = "GameServ";
  nick = "StatServ";
};

# ---[ Service Aliases ]---------------------------------------------------
# These let users type /CHANSERV instead of /MSG ChanServ
# Uncomment when services are linked.
#
# Pseudo "CHANSERV" {
#   name = "ChanServ";
#   nick = "ChanServ@services.example.com";
# };
# Pseudo "NICKSERV" {
#   name = "NickServ";
#   nick = "NickServ@services.example.com";
# };
# Pseudo "LOGIN" {
#   name = "NickServ";
#   prepend = "IDENTIFY ";
#   nick = "NickServ@services.example.com";
# };

# ---[ Quarantined Channels ]----------------------------------------------
# Channels that cannot be OPMODE'd by opers (unless forced with !)
Quarantine {
  "#services" = "Protected services channel";
};

